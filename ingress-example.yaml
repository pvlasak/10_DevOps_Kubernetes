apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
spec:
  rules:
  - host: myapp.com
    http: 
      paths:
        - path: /analytics
          pathType: Prefix
          backend:
            service:
              name: analytics-service
              port:
                number: 3000
        - path: /shopping
          pathType: Prefix
          backend:
            service:
              name: shopping-service
              port:
                number: 8080