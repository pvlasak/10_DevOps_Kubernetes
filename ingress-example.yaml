apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
spec:
  rules:
  - host: analytics.myapp.com
    http: 
      paths:
        - path: /
          pathType: 
          backend:
            service:
              name: analytics-service
              port:
                number: 3000
  - host: shopping.myapp.com
    http: 
      paths:
        - path: /
          pathType: 
          backend:
            service:
              name: shopping-service
              port:
                number: 3000